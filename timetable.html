<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChainCampus | Weekly Timetable</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="timetable">
    <div class="mesh-bg"></div>
    <div class="app-shell">
      <!-- Sidebar -->
      <aside class="sidebar" data-sidebar></aside>
      <div class="sidebar-overlay"></div>
      
      <!-- Main Content -->
      <div class="main-content">
        <!-- Top bar -->
        <div class="top-bar">
          <button class="hamburger" id="hamburger-btn">☰</button>
          <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;">Timetable</span>
          <div></div>
        </div>
        
        <main class="page-content">
          <div class="page-header">
            <div>
              <p class="eyebrow">Class Schedule</p>
              <div class="page-title">Weekly Timetable</div>
              <p class="page-subtitle">Your personalized lecture schedule based on course enrollment</p>
            </div>
          </div>

          <div class="card card-p" style="border-radius:var(--r-xl);">
            <div class="section-head" style="margin-bottom:20px;">
              <div>
                <p class="eyebrow">Schedule</p>
                <h2>Current Semester Classes</h2>
              </div>
              <span class="pill pill-emerald">Active Classes</span>
            </div>
            
            <div class="timetable-grid" data-timetable>
              <!-- Timetable rendered here via JS -->
            </div>
          </div>
        </main>
      </div>
    </div>
    <div class="toast-stack" data-toast-stack></div>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/timetable.js"></script>
  </body>
</html>
