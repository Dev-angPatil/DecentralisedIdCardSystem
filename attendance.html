<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChainCampus | Attendance</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="attendance">
    <div class="site-shell">
      <header data-site-header></header>

      <main class="page-content">
        <section class="content-grid" style="grid-template-columns:1fr">
          <article class="glass-card section-card">
            <div class="section-head">
              <div>
                <p class="eyebrow">Course Attendance</p>
                <h2>Track your lecture attendance</h2>
              </div>
              <span class="pill">On-Chain Verified</span>
            </div>
            <div class="cards-grid" data-attendance-list style="grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));"></div>
          </article>
        </section>
      </main>

      <footer data-site-footer></footer>
    </div>

    <div class="toast-stack" data-toast-stack></div>

    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/attendance.js"></script>
  </body>
</html>
