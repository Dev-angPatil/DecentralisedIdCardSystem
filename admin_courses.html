<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChainCampus | Manage Courses</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="admin_courses">
    <div class="site-shell">
      <header data-site-header></header>

      <main class="page-content">
        <section class="content-grid" style="grid-template-columns: 1fr 1.5fr;">
          <article class="glass-card section-card">
            <div class="section-head">
              <div>
                <p class="eyebrow">Admin Actions</p>
                <h2>Add New Course</h2>
              </div>
            </div>
            <form class="form-grid" data-add-course-form>
              <label>
                Course Name
                <input type="text" name="name" placeholder="e.g. Distributed Systems" required />
              </label>
              <label>
                Course Code
                <input type="text" name="code" placeholder="e.g. CS801" required />
              </label>
              <div class="two-column">
                <label>
                  Credits
                  <input type="number" name="credits" value="3" min="1" max="5" required />
                </label>
                <label>
                  Color Theme
                  <select name="color">
                    <option value="blue">Blue</option>
                    <option value="pink">Pink</option>
                    <option value="mint">Mint</option>
                    <option value="amber">Amber</option>
                    <option value="violet">Violet</option>
                  </select>
                </label>
              </div>
              <label>
                Instructor
                <input type="text" name="instructor" placeholder="Dr. Name" required />
              </label>
              <div class="two-column">
                <label>
                  Time Slot
                  <input type="text" name="time" placeholder="e.g. 9:00 AM" required />
                </label>
                <label>
                  Room
                  <input type="text" name="room" placeholder="e.g. LH-101" required />
                </label>
              </div>
              <label>
                Days (comma separated)
                <input type="text" name="days" placeholder="Mon, Wed, Fri" required />
              </label>

              <button type="submit" class="primary-btn" data-submit-btn>Create Course (On-Chain)</button>
            </form>
          </article>

          <article class="glass-card section-card">
            <div class="section-head">
              <div>
                <p class="eyebrow">Live Catalog</p>
                <h2>Existing Courses</h2>
              </div>
            </div>
            <div class="cards-grid" data-courses-list style="grid-template-columns: 1fr;">
              <!-- Rendered via JS -->
            </div>
          </article>
        </section>
      </main>

      <footer data-site-footer></footer>
    </div>

    <div class="toast-stack" data-toast-stack></div>

    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/admin.js"></script>
  </body>
</html>
