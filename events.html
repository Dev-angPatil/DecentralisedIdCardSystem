<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChainCampus | Events</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="events">
    <div class="mesh-bg"></div>
    <div class="app-shell">
      <aside class="sidebar" data-sidebar></aside>
      <div class="sidebar-overlay"></div>
      <div class="main-content">
        <div class="top-bar">
          <button class="hamburger" id="hamburger-btn">☰</button>
          <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;">Events</span>
          <div></div>
        </div>
        <main class="page-content">
          <div class="page-header">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
              <div>
                <p class="eyebrow">Campus Events</p>
                <div class="page-title">Upcoming Events</div>
                <p class="page-subtitle">Registration is verified on-chain via Solana</p>
              </div>
              <span class="pill pill-amber">⚡ Live</span>
            </div>
          </div>

          <div class="cards-grid" data-events-list style="margin-bottom:24px;"></div>

          <!-- Create Event (shown for all, useful for demo) -->
          <div class="card card-p" style="border-radius:var(--r-xl);">
            <div class="section-head">
              <div>
                <p class="eyebrow">Admin Action</p>
                <h2>Create Event</h2>
              </div>
              <span class="pill pill-teal">On-chain</span>
            </div>
            <form class="form-grid" data-create-event-form>
              <div class="form-group">
                <label>Event Title</label>
                <input type="text" name="title" placeholder="Blockchain Hackathon 2026" required />
              </div>
              <div class="form-group">
                <label>Date</label>
                <input type="text" name="date" placeholder="June 15, 2026" required />
              </div>
              <div class="form-group">
                <label>Venue</label>
                <input type="text" name="venue" placeholder="Innovation Hub" required />
              </div>
              <div class="form-group">
                <label>Capacity</label>
                <input type="number" name="capacity" placeholder="100" required />
              </div>
              <div class="form-group wide">
                <label>Description</label>
                <input type="text" name="description" placeholder="Brief event description..." required />
              </div>
              <div class="wide" style="display:flex;gap:12px;align-items:center;margin-top:4px;">
                <button type="submit" class="btn btn-primary" data-create-event-submit>Create Event On-Chain</button>
              </div>
            </form>
            <div data-create-event-status style="margin-top:12px;"></div>
          </div>
        </main>
      </div>
    </div>
    <div class="toast-stack" data-toast-stack></div>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/events.js"></script>
  </body>
</html>
