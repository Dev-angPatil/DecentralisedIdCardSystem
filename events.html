<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChainCampus | Events</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="events">
    <div class="site-shell">
      <header data-site-header></header>

      <main class="page-content">
        <section class="hero-panel glass-card">
          <div class="hero-copy">
            <span class="chain-tag">Event participation</span>
            <h1>Events page with explicit blockchain-verified registration actions.</h1>
            <p>
              Every event button below calls <code>registerForEventOnChain()</code> through the
              dedicated blockchain abstraction layer.
            </p>
          </div>
          <div class="hero-rail">
            <div class="rail-card">
              <p>Primary action label</p>
              <strong>Register (Blockchain Verified)</strong>
            </div>
            <div class="rail-card">
              <p>Success state</p>
              <strong>Verified badge</strong>
            </div>
          </div>
        </section>

        <section class="cards-grid" data-events-list></section>


      </main>

      <footer data-site-footer></footer>
    </div>

    <div class="toast-stack" data-toast-stack></div>

    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/events.js"></script>
  </body>
</html>
