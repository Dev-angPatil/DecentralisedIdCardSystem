<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChainCampus | Profile</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="profile">
    <div class="site-shell">
      <header data-site-header></header>

      <main class="page-content">
        <section class="content-grid">
          <article class="glass-card section-card">
            <div class="section-head">
              <div>
                <p class="eyebrow">Student Profile</p>
                <h2>Student details</h2>
              </div>
              <span class="pill">Profile</span>
            </div>
            <div class="profile-grid" data-profile-details></div>
          </article>

          <aside class="glass-card section-card">
            <p class="eyebrow">View On-Chain Data</p>
            <h2>Mock blockchain mirror</h2>
            <div class="stack-list" data-onchain-details></div>
          </aside>
        </section>
      </main>

      <footer data-site-footer></footer>
    </div>

    <div class="toast-stack" data-toast-stack></div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
