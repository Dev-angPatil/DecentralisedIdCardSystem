<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChainCampus | Dashboard</title>
    <meta name="description" content="Your ChainCampus student dashboard — attendance, transactions, scholarships and more." />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="dashboard">
    <div class="mesh-bg"></div>

    <div class="app-shell">
      <!-- Sidebar -->
      <aside class="sidebar" data-sidebar></aside>
      <div class="sidebar-overlay"></div>

      <!-- Main -->
      <div class="main-content">
        <!-- Mobile top bar -->
        <div class="top-bar">
          <button class="hamburger" id="hamburger-btn">☰</button>
          <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;">ChainCampus</span>
          <div></div>
        </div>

        <main class="page-content">
          <!-- Page header + welcome -->
          <div class="page-header" data-welcome>
            <div class="page-title">Loading...</div>
          </div>

          <!-- Stats grid -->
          <div class="stats-grid" data-dashboard-stats></div>

          <!-- Hero tx box -->
          <div class="dashboard-hero" data-last-transaction style="margin-bottom:24px;"></div>

          <!-- Bottom grid -->
          <div class="content-grid">
            <!-- Notices -->
            <div class="card card-p" style="border-radius:var(--r-lg);">
              <div class="section-head">
                <div>
                  <p class="eyebrow">Campus Updates</p>
                  <h2>Recent Notices</h2>
                </div>
                <span class="pill pill-teal">Live</span>
              </div>
              <div data-dashboard-notices></div>
            </div>

            <!-- TX Log -->
            <div class="card card-p" style="border-radius:var(--r-lg);">
              <div class="section-head">
                <div>
                  <p class="eyebrow">Blockchain</p>
                  <h2>Transaction Log</h2>
                </div>
              </div>
              <div class="tx-timeline" data-tx-log style="max-height:280px;overflow-y:auto;"></div>
            </div>
          </div>

          <!-- Scholarship Applications -->
          <div class="card card-p" style="border-radius:var(--r-lg);" id="applications">
            <div class="section-head">
              <div>
                <p class="eyebrow">Scholarships</p>
                <h2>My Applications</h2>
              </div>
              <span class="pill">On-chain flow</span>
            </div>
            <div data-scholarship-applications></div>
          </div>
        </main>
      </div>
    </div>

    <div class="toast-stack" data-toast-stack></div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
