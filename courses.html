<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChainCampus | Courses</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="courses">
    <div class="mesh-bg"></div>
    <div class="app-shell">
      <aside class="sidebar" data-sidebar></aside>
      <div class="sidebar-overlay"></div>
      <div class="main-content">
        <div class="top-bar">
          <button class="hamburger" id="hamburger-btn">☰</button>
          <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;">Courses</span>
          <div></div>
        </div>
        <main class="page-content">
          <div class="page-header">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
              <div>
                <p class="eyebrow">Course Enrollment</p>
                <div class="page-title">Semester Courses</div>
                <p class="page-subtitle">Enrolling logs a verifiable transaction on Solana devnet</p>
              </div>
              <span class="pill pill-emerald">Enrollment Open</span>
            </div>
          </div>

          <div class="card card-p" style="border-radius:var(--r-xl);">
            <div class="section-head">
              <div>
                <p class="eyebrow">Available</p>
                <h2>Core & Elective Courses</h2>
              </div>
            </div>
            <div class="cards-grid" data-courses-list></div>
          </div>
        </main>
      </div>
    </div>
    <div class="toast-stack" data-toast-stack></div>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/courses.js"></script>
  </body>
</html>
