<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChainCampus | Manage Events</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="admin_events">
    <div class="mesh-bg"></div>
    <div class="app-shell">
      <aside class="sidebar" data-sidebar></aside>
      <div class="sidebar-overlay"></div>
      <div class="main-content">
        <div class="top-bar">
          <button class="hamburger" id="hamburger-btn">☰</button>
          <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;">Manage Events</span>
          <div></div>
        </div>
        <main class="page-content">
          <div class="page-header">
            <p class="eyebrow">Admin · Events</p>
            <div class="page-title">Event Management</div>
            <p class="page-subtitle">Create and manage campus events with on-chain verification</p>
          </div>

          <div class="content-grid" style="grid-template-columns:380px 1fr;">
            <!-- Create Event Form -->
            <div class="card card-p" style="border-radius:var(--r-xl);">
              <div class="section-head" style="margin-bottom:18px;">
                <div>
                  <p class="eyebrow">Deploy</p>
                  <h2>Create Campus Event</h2>
                </div>
              </div>
              <form data-add-event-form style="display:flex;flex-direction:column;gap:14px;">
                <div class="form-group" style="margin-bottom:0;">
                  <label>Event Title</label>
                  <input type="text" name="title" placeholder="e.g. Winter Workshop" required />
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                  <div class="form-group" style="margin-bottom:0;">
                    <label>Date</label>
                    <input type="text" name="date" placeholder="May 20, 2026" required />
                  </div>
                  <div class="form-group" style="margin-bottom:0;">
                    <label>Capacity</label>
                    <input type="number" name="capacity" value="100" required />
                  </div>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                  <label>Venue</label>
                  <input type="text" name="venue" placeholder="Innovation Lab" required />
                </div>
                <div class="form-group" style="margin-bottom:0;">
                  <label>Description</label>
                  <textarea name="description" placeholder="Event details..." style="resize:vertical;min-height:80px;"></textarea>
                </div>
                <button type="submit" class="btn btn-primary" data-submit-btn>Deploy Event On-Chain →</button>
              </form>
            </div>

            <!-- Current Events -->
            <div class="card card-p" style="border-radius:var(--r-xl);">
              <div class="section-head">
                <div>
                  <p class="eyebrow">Current Events</p>
                  <h2>Event Calendar</h2>
                </div>
              </div>
              <div data-events-list></div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <div class="toast-stack" data-toast-stack></div>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/admin.js"></script>
  </body>
</html>
