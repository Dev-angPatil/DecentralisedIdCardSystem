<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChainCampus | Sign Up</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script>
      // Seamless auto-redirect to unified login page
      setTimeout(() => {
        window.location.href = "login.html";
      }, 1800);
    </script>
  </head>
  <body data-page="signup">
    <div class="site-shell">
      <header data-site-header></header>

      <main class="page-content" style="display: grid; place-items: center; min-height: 50vh;">
        <article class="glass-card section-card" style="max-width: 500px; padding: 40px; text-align: center;">
          <div class="wallet-icon-glow" style="width: 80px; height: 80px; border-radius: 50%; background: var(--teal-pale); border: 2px solid var(--teal); display: grid; place-items: center; margin: 0 auto 25px; box-shadow: var(--shadow-teal);">
            <span style="font-size: 2.2rem; animation: pulse 2s infinite;">⛓️</span>
          </div>
          <span class="chain-tag" style="margin-bottom: 15px;">Web3-First Architecture</span>
          <h2 style="font-size: 1.5rem; margin-bottom: 12px;">Unified Onboarding Active</h2>
          <p style="color: var(--text-soft); font-size: 0.9rem; line-height: 1.7; margin-bottom: 25px;">
            ChainCampus has transitioned to a passwordless, Web3-first platform. All student accounts and registrations are created by connecting your wallet.
          </p>
          
          <div class="loader-bar" style="width: 100%; height: 4px; background: var(--bg-soft); border-radius: var(--r-pill); overflow: hidden; position: relative;">
            <div class="loader-progress" style="width: 40%; height: 100%; background: var(--amber); border-radius: var(--r-pill); position: absolute; left: 0; animation: loadingShimmer 1.5s infinite var(--ease-out);"></div>
          </div>
          
          <p class="small-copy" style="margin-top: 15px; color: var(--text-muted);">
            Redirecting to the Web3 Sign-in Hub... <a href="login.html" style="color:var(--teal-light); text-decoration: underline; font-weight:600;">click here if not redirected</a>.
          </p>
        </article>
      </main>

      <footer data-site-footer></footer>
    </div>

    <!-- Keyframe shimmer definition style injection just for the loader -->
    <style>
      @keyframes loadingShimmer {
        0% { left: -40%; }
        100% { left: 100%; }
      }
      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }
    </style>
  </body>
</html>
